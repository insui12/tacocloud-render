# ── 실습과제 25-3 — Render 배포용 프로파일 ─────────────────────────
# 사용 방법:
#   ① jar 패키징:  mvn -q -DskipTests package
#   ② 로컬에서 Atlas 직접 연결 테스트:
#        MONGODB_PASSWORD=<atlas 비번> \
#        java -jar target/taco-cloud-0.0.1-SNAPSHOT.jar --spring.profiles.active=prod
#   ③ Render 환경변수에 MONGODB_PASSWORD 등록 후 Dockerfile 로 자동 빌드.
#
# 강의자료 25-3 슬라이드 19: 테스트 시에는 실제 비번을 박았다가, Render 호스팅 시
# ${MONGODB_PASSWORD} placeholder 로 갈아끼우라고 안내. 본 파일은 처음부터
# environment variable 치환을 사용해 두 경우 모두 동일하게 동작한다.

spring.data.mongodb.uri=mongodb+srv://tjwls030502_db_user:${MONGODB_PASSWORD}@cluster0.sgrcxlk.mongodb.net/tacocloud?retryWrites=true&w=majority&appName=Cluster0

# Render 의 Free tier 가 PORT 환경변수를 동적으로 부여한다. 기본은 8085 로 두고
# Render 가 PORT 를 주입하면 그쪽이 우선 적용된다.
server.port=${PORT:8085}

# Tomcat 의 forwarded headers 처리 — Render 의 리버스 프록시 뒤에서 X-Forwarded-Proto
# 가 정확히 인식되어 redirect 가 HTTPS 로 가도록.
server.forward-headers-strategy=native

# Spring Security 가 X-Forwarded-Host / Proto 를 신뢰하도록.
spring.thymeleaf.cache=true
logging.level.tacos=INFO
