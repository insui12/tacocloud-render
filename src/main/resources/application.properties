server.port=8085
spring.application.name=tacocloud
spring.thymeleaf.cache=false
logging.level.tacos=DEBUG

# ── 실습과제 25 — Spring Boot + Security + MongoDB ─────────────
# 강의자료의 25강은 MongoDB Atlas (cloud) 사용을 안내하지만, 본 application.properties 는
# 로컬 mongod 기준 (25-3 Render 호스팅 시 application-prod.properties 를 활성화하여
# Atlas URI + ${MONGODB_PASSWORD} 환경변수 치환).
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=tacocloud

# Atlas / Render 환경 (--spring.profiles.active=prod):
#   application-prod.properties 의 spring.data.mongodb.uri 가 위 설정을 덮어쓴다.
