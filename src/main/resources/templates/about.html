<!DOCTYPE html>

    <title>Taco Cloud - About</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
    <h1>About Taco Cloud</h1>
    <img th:src="@{/images/TacoCloud.png}" alt="Taco Cloud logo"/>

    <p>
        <a th:href="@{/}">Back to home</a>
