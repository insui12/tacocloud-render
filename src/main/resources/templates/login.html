<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Taco Cloud · Login</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
    <h1>Welcome to Taco Cloud!</h1>
    <img th:src="@{/images/TacoCloud.png}" alt="Taco Cloud logo"/>
    <p class="signature">2022810073 최서진</p>

    <div th:if="${param.error}" class="validationError">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="signature">
        You have been logged out.
    </div>

    <form method="POST" th:action="@{/login}" id="loginForm">
        <label for="username">Username:</label>
        <input type="text" name="username" id="username"/><br/>

        <label for="password">Password:</label>
        <input type="password" name="password" id="password"/><br/>

        <input type="submit" value="Login"/>
        <a th:href="@{/register}">or register</a>
    </form>
</body>
</html>
