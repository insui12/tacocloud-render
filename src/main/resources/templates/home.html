<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Taco Cloud</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
</head>
<body>
    <h1>Welcome to...</h1>
    <img th:src="@{/images/TacoCloud.png}" alt="Taco Cloud logo"/>
    <p class="signature">2022810073 최서진 - Taco Cloud Application</p>

    <div sec:authorize="isAuthenticated()">
        <p class="signature">
            Logged in as <strong sec:authentication="name">user</strong>
            (<span sec:authentication="authorities">authorities</span>)
        </p>
        <p>
            <a th:href="@{/design}">Design a taco</a> |
            <a th:href="@{/about}">About</a> |
            <form th:action="@{/logout}" method="POST" style="display:inline">
                <button type="submit" style="background:none;border:none;color:#c0392b;cursor:pointer;text-decoration:underline;padding:0;">Logout</button>
            </form>
        </p>
    </div>

    <div sec:authorize="!isAuthenticated()">
        <p>
            <a th:href="@{/login}">Login</a> |
            <a th:href="@{/register}">Register</a> |
            <a th:href="@{/about}">About</a>
        </p>
    </div>
</body>
</html>
